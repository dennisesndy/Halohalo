<!DOCTYPE html>
<html lang="light" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Halo-Halo{% block title %}{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    /* ── tokens ──────────────────────────────────────────────────────── */
    :root {
      --purple:   #4B164C;
      --purple2:  #6b2a6e;
      --pink:     #F37E9A;
      --pink2:    #fde8ef;
      --cream:    #FFFCF0;
      --cream2:   #f5eedf;
      --white:    #ffffff;
      --text:     #1e1025;
      --muted:    #7a5a85;
      --light:    #b8a0c0;
      --border:   #e8dff0;
      --green:    #16a34a;
      --green-bg: #f0fdf4;
      --red:      #dc2626;
      --red-bg:   #fef2f2;
      --amber:    #d97706;
      --r0: #94a3b8; --r1: #ef4444; --r2: #f97316;
      --r3: #eab308; --r4: #84cc16; --r5: #22c55e;
    }
    [data-theme="dark"] {
      --purple:   #d8a4f8;
      --purple2:  #b97fd4;
      --pink:     #f9a8c9;
      --pink2:    #3b1a2e;
      --cream:    #130b1a;
      --cream2:   #1c1128;
      --white:    #231530;
      --text:     #f0e6fa;
      --muted:    #c4a8d4;
      --light:    #8a6a9a;
      --border:   #3a2450;
      --green:    #4ade80;
      --green-bg: #052e16;
      --red:      #f87171;
      --red-bg:   #450a0a;
    }

    /* ── reset ───────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream); color: var(--text);
      min-height: 100vh; font-size: 15px;
      transition: background .2s, color .2s;
    }

    /* ── nav ─────────────────────────────────────────────────────────── */
    .nav {
      height: 56px; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--purple);
      position: sticky; top: 0; z-index: 50;
    }
    .nav-brand {
      display: flex; align-items: center; gap: 8px;
      text-decoration: none;
      font-family: 'Coiny', cursive; font-size: 1.4rem; color: var(--cream);
    }
    .nav-right { display: flex; align-items: center; gap: 8px; }

    /* ── dark-mode toggle ────────────────────────────────────────────── */
    .toggle-wrap {
      display: flex; align-items: center;
      background: rgba(255,255,255,.15);
      border-radius: 999px; padding: 3px;
      cursor: pointer; transition: background .2s;
      border: none; gap: 0;
    }
    .toggle-wrap:hover { background: rgba(255,255,255,.25); }
    .toggle-knob {
      width: 22px; height: 22px; border-radius: 50%;
      background: var(--cream); display: flex;
      align-items: center; justify-content: center;
      font-size: .7rem; transition: transform .25s;
      flex-shrink: 0;
    }
    .toggle-track {
      width: 18px; height: 22px; display: flex;
      align-items: center; justify-content: center;
      font-size: .7rem; color: rgba(255,255,255,.6);
      flex-shrink: 0;
    }
    [data-theme="dark"] .toggle-wrap .toggle-knob { transform: translateX(0); }

    /* ── ghost button ────────────────────────────────────────────────── */
    .btn-nav {
      background: rgba(255,255,255,.15); border: none;
      color: var(--cream); border-radius: 8px;
      padding: 6px 14px; font-family: 'Nunito', sans-serif;
      font-size: .8rem; font-weight: 700; cursor: pointer;
      transition: background .2s;
    }
    .btn-nav:hover { background: rgba(255,255,255,.25); }

    /* ── avatar ──────────────────────────────────────────────────────── */
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      background: var(--pink); color: #fff;
      font-size: .8rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── buttons ─────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px; border: none; border-radius: 10px;
      font-family: 'Nunito', sans-serif; font-size: .85rem;
      font-weight: 700; cursor: pointer; transition: filter .15s, transform .1s;
      white-space: nowrap;
    }
    .btn:hover  { filter: brightness(1.08); }
    .btn:active { transform: scale(.97); }
    .btn-primary   { background: var(--purple); color: #fff; }
    .btn-secondary { background: var(--pink);   color: #fff; }
    .btn-ghost {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-ghost:hover { border-color: var(--purple); color: var(--purple); }
    .btn-danger { background: var(--red-bg); color: var(--red); border: 1.5px solid transparent; }
    .btn-danger:hover { border-color: var(--red); }
    .btn-sm { padding: 6px 14px; font-size: .78rem; border-radius: 8px; }
    .btn-icon {
      background: transparent; border: 1.5px solid var(--border);
      color: var(--muted); border-radius: 8px;
      width: 32px; height: 32px; padding: 0;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: .85rem; cursor: pointer; transition: all .15s;
    }
    .btn-icon:hover { border-color: var(--purple); color: var(--purple); }

    /* ── form fields ─────────────────────────────────────────────────── */
    .field {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid var(--border); border-radius: 10px;
      background: var(--white); color: var(--text);
      font-family: 'Nunito', sans-serif; font-size: .9rem;
      outline: none; transition: border-color .18s;
    }
    .field:focus { border-color: var(--pink); }
    textarea.field { resize: vertical; min-height: 130px; font-size: .83rem; }
    .label {
      display: block; font-size: .73rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
      margin-bottom: 6px;
    }

    /* ── modal ───────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.4); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 16px;
      animation: fadeIn .18s ease;
    }
    .modal {
      background: var(--cream); border-radius: 18px;
      width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: slideUp .22s ease; overflow: hidden;
    }
    .modal-head {
      background: var(--purple); padding: 18px 22px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-head h3 {
      font-family: 'Coiny', cursive; font-size: 1.2rem; color: #fff;
    }
    .modal-close {
      background: rgba(255,255,255,.18); border: none; color: #fff;
      border-radius: 50%; width: 28px; height: 28px;
      font-size: .9rem; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .2s;
    }
    .modal-close:hover { background: rgba(255,255,255,.32); }
    .modal-body   { padding: 22px; }
    .modal-footer {
      padding: 14px 22px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
      background: var(--cream2);
    }

    /* ── card surface ────────────────────────────────────────────────── */
    .card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 14px;
    }

    /* ── error box ───────────────────────────────────────────────────── */
    .err {
      background: var(--red-bg); color: var(--red);
      border-radius: 8px; padding: 9px 13px;
      font-size: .82rem; font-weight: 600; margin-top: 10px;
    }

    /* ── toast ───────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--purple); color: #fff;
      padding: 10px 22px; border-radius: 999px;
      font-size: .83rem; font-weight: 600;
      opacity: 0; pointer-events: none;
      transition: all .25s; z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── utilities ───────────────────────────────────────────────────── */
    .hidden { display: none !important; }
    .row    { display: flex; align-items: center; gap: 8px; }
    .ml     { margin-left: auto; }

    /* ── animations ──────────────────────────────────────────────────── */
    @keyframes fadeIn  { from { opacity: 0; }               to { opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(14px); opacity: 0; }
                         to   { transform: translateY(0);    opacity: 1; } }
  </style>
</head>
<body>

{% block body %}{% endblock %}

<div id="toast"></div>

<script>
  /* ── dark mode ────────────────────────────────────────────────────── */
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const knob = document.getElementById('dm-knob');
    const track = document.getElementById('dm-track');
    if (knob) knob.textContent = t === 'dark' ? '☀️' : '🌙';
    if (track) track.textContent = t === 'dark' ? '' : '';
  }
  function toggleDark() {
    const cur  = document.documentElement.getAttribute('data-theme');
    const next = cur === 'dark' ? 'light' : 'dark';
    applyTheme(next);
    try { localStorage.setItem('hh-theme', next); } catch(e) {}
  }
  (function() {
    let t = 'light';
    try { t = localStorage.getItem('hh-theme') ||
      (window.matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light'); } catch(e) {}
    applyTheme(t);
  })();

  /* ── toast ────────────────────────────────────────────────────────── */
  function toast(msg, ms = 2500) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), ms);
  }

  /* ── api helper ──────────────────────────────────────────────────── */
  async function api(url, opts = {}) {
    opts.headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    const r = await fetch(url, opts);
    const d = await r.json();
    return { ok: r.ok, data: d };
  }

  /* ── esc ─────────────────────────────────────────────────────────── */
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── close overlay on backdrop click ────────────────────────────── */
  document.addEventListener('click', e => {
    if (e.target.classList.contains('overlay')) e.target.classList.add('hidden');
  });

  /* ── logout ──────────────────────────────────────────────────────── */
  async function logout() {
    await api('/api/auth/logout', { method: 'POST' });
    location.href = '/login';
  }
</script>

{% block scripts %}{% endblock %}
</body>
</html>
