{% extends "base.html" %}
{% block title %} · Sign in{% endblock %}
{% block body %}
<style>
  .login-page {
    min-height: 100vh; display: flex;
    align-items: center; justify-content: center; padding: 20px;
    background: var(--cream);
  }
  .login-box {
    width: 100%; max-width: 380px;
    background: var(--white); border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
  }
  .login-top {
    background: var(--purple); padding: 32px 28px 24px;
    text-align: center;
  }
  .login-emoji { font-size: 2.4rem; margin-bottom: 6px; }
  .login-title {
    font-family: 'Coiny', cursive; font-size: 2rem; color: #fff; line-height: 1;
  }
  .login-sub { font-size: .8rem; color: rgba(255,255,255,.55); margin-top: 4px; }
  .tab-bar { display: flex; border-bottom: 1px solid var(--border); }
  .tab-btn {
    flex: 1; padding: 12px; border: none; background: transparent;
    font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700;
    color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .18s;
  }
  .tab-btn.active { color: var(--purple); border-bottom-color: var(--purple); }
  .login-form { padding: 22px 24px 26px; }
  .form-row { margin-bottom: 16px; }
  .pin-dots { display: flex; gap: 10px; justify-content: center; margin-bottom: 8px; }
  .pin-dot {
    width: 11px; height: 11px; border-radius: 50%;
    border: 2px solid var(--border); background: transparent; transition: all .18s;
  }
  .pin-dot.on { background: var(--pink); border-color: var(--pink); transform: scale(1.1); }
  .field-pin {
    width: 100%; text-align: center; letter-spacing: .6em;
    font-size: 1.3rem; font-weight: 700;
  }
  .btn-full { width: 100%; justify-content: center; margin-top: 4px; border-radius: 10px; padding: 11px; }
</style>

<div class="login-page">
  <div class="login-box">
    <div class="login-top">
      <div class="login-emoji">🍧</div>
      <div class="login-title">Halo-Halo</div>
      <div class="login-sub">Your personal study companion</div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('in', this)">Sign In</button>
      <button class="tab-btn"        onclick="switchTab('up', this)">Register</button>
    </div>

    <div class="login-form">
      <div class="err hidden" id="auth-err"></div>

      <!-- sign in -->
      <div id="form-in">
        <div class="form-row">
          <label class="label">Username</label>
          <input class="field" id="in-user" type="text" placeholder="your username" autocomplete="username"/>
        </div>
        <div class="form-row">
          <label class="label">4-digit PIN</label>
          <div class="pin-dots">
            <div class="pin-dot" id="in-d0"></div><div class="pin-dot" id="in-d1"></div>
            <div class="pin-dot" id="in-d2"></div><div class="pin-dot" id="in-d3"></div>
          </div>
          <input class="field field-pin" id="in-pin" type="password" maxlength="4"
                 inputmode="numeric" placeholder="••••" autocomplete="current-password"/>
        </div>
        <button class="btn btn-primary btn-full" onclick="doLogin()">Sign in</button>
      </div>

      <!-- register -->
      <div id="form-up" class="hidden">
        <div class="form-row">
          <label class="label">Username</label>
          <input class="field" id="up-user" type="text" placeholder="choose a username" autocomplete="username"/>
        </div>
        <div class="form-row">
          <label class="label">4-digit PIN</label>
          <div class="pin-dots">
            <div class="pin-dot" id="up-d0"></div><div class="pin-dot" id="up-d1"></div>
            <div class="pin-dot" id="up-d2"></div><div class="pin-dot" id="up-d3"></div>
          </div>
          <input class="field field-pin" id="up-pin" type="password" maxlength="4"
                 inputmode="numeric" placeholder="••••" autocomplete="new-password"/>
        </div>
        <div class="form-row">
          <label class="label">Confirm PIN</label>
          <input class="field field-pin" id="up-pin2" type="password" maxlength="4"
                 inputmode="numeric" placeholder="••••" autocomplete="new-password"/>
        </div>
        <button class="btn btn-secondary btn-full" onclick="doRegister()">Create account</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  function switchTab(t, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('form-in').classList.toggle('hidden', t !== 'in');
    document.getElementById('form-up').classList.toggle('hidden', t !== 'up');
    document.getElementById('auth-err').classList.add('hidden');
  }

  function bindDots(inputId, prefix) {
    document.getElementById(inputId).addEventListener('input', e => {
      const n = e.target.value.length;
      for (let i = 0; i < 4; i++)
        document.getElementById(`${prefix}-d${i}`).classList.toggle('on', i < n);
    });
  }
  bindDots('in-pin', 'in');
  bindDots('up-pin', 'up');

  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('form-in').classList.contains('hidden')) doLogin();
    else doRegister();
  });

  async function doLogin() {
    const u = document.getElementById('in-user').value.trim();
    const p = document.getElementById('in-pin').value.trim();
    showErr('');
    const { ok, data } = await api('/api/auth/login', { method:'POST', body: JSON.stringify({username:u, pin:p}) });
    if (!ok) { showErr(data.error); return; }
    location.href = '/dashboard';
  }

  async function doRegister() {
    const u  = document.getElementById('up-user').value.trim();
    const p  = document.getElementById('up-pin').value.trim();
    const p2 = document.getElementById('up-pin2').value.trim();
    showErr('');
    if (p !== p2) { showErr('PINs do not match.'); return; }
    const { ok, data } = await api('/api/auth/register', { method:'POST', body: JSON.stringify({username:u, pin:p}) });
    if (!ok) { showErr(data.error); return; }
    location.href = '/dashboard';
  }

  function showErr(msg) {
    const el = document.getElementById('auth-err');
    if (!msg) { el.classList.add('hidden'); return; }
    el.textContent = msg; el.classList.remove('hidden');
  }
</script>
{% endblock %}
