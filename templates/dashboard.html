{% extends "base.html" %}
{% block title %} · Dashboard{% endblock %}
{% block body %}
<style>
  .page { max-width: 900px; margin: 0 auto; padding: 0 16px 60px; }

  /* ── greeting strip ──────────────────────────────────────────────── */
  .greeting {
    padding: 28px 0 20px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .greeting-text h2 {
    font-family: 'Coiny', cursive; font-size: 1.7rem; color: var(--purple); line-height: 1.1;
  }
  .greeting-text p { font-size: .82rem; color: var(--muted); margin-top: 3px; }

  /* ── stat row ────────────────────────────────────────────────────── */
  .stats { display: flex; gap: 10px; margin-bottom: 28px; }
  .stat-pill {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 16px; flex: 1; text-align: center;
  }
  .stat-num { font-family: 'Coiny', cursive; font-size: 1.5rem; color: var(--purple); }
  .stat-lbl { font-size: .7rem; color: var(--muted); font-weight: 600; margin-top: 1px; }

  /* ── section header ──────────────────────────────────────────────── */
  .sec-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .sec-title { font-family: 'Coiny', cursive; font-size: 1.25rem; color: var(--text); }

  /* ── deck grid ───────────────────────────────────────────────────── */
  .deck-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
  }

  /* ── deck card ───────────────────────────────────────────────────── */
  .deck-card {
    background: var(--white); border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    cursor: pointer; transition: box-shadow .18s, transform .18s;
    animation: slideUp .25s ease both;
  }
  .deck-card:hover { box-shadow: 0 4px 18px rgba(75,22,76,.12); transform: translateY(-2px); }
  .deck-card-bar { height: 4px; background: linear-gradient(90deg, var(--purple), var(--pink)); }
  .deck-card-body { padding: 16px; }
  .deck-emoji { font-size: 1.8rem; margin-bottom: 8px; display: block; }
  .deck-name { font-weight: 700; font-size: .95rem; margin-bottom: 4px; line-height: 1.3; }
  .deck-meta { font-size: .73rem; color: var(--muted); margin-bottom: 12px; }

  /* mastery bar */
  .mbar-wrap { margin-bottom: 4px; }
  .mbar-row  { display: flex; justify-content: space-between; font-size: .68rem; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .mbar { height: 4px; background: var(--cream2); border-radius: 4px; overflow: hidden; }
  .mbar-fill { height: 100%; background: linear-gradient(90deg, var(--purple), var(--pink)); border-radius: 4px; transition: width .5s; }

  .deck-actions { display: flex; gap: 6px; margin-top: 12px; }
  .deck-actions .btn { flex: 1; justify-content: center; font-size: .75rem; padding: 7px 8px; }

  /* ── add deck card ────────────────────────────────────────────────── */
  .deck-add {
    background: transparent; border: 1.5px dashed var(--border);
    border-radius: 14px; min-height: 180px;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 8px; cursor: pointer;
    transition: border-color .18s, background .18s; padding: 20px;
  }
  .deck-add:hover { border-color: var(--pink); background: var(--pink2); }
  .deck-add-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--cream2); display: flex; align-items: center;
    justify-content: center; font-size: 1.1rem; transition: background .18s;
  }
  .deck-add:hover .deck-add-icon { background: var(--pink); color: #fff; }
  .deck-add span { font-size: .82rem; font-weight: 700; color: var(--muted); }
  .deck-add:hover span { color: var(--pink); }

  /* ── empty state ─────────────────────────────────────────────────── */
  .empty {
    grid-column: 1 / -1; text-align: center;
    padding: 48px 20px; border: 1.5px dashed var(--border); border-radius: 14px;
    background: var(--white);
  }
  .empty-emoji { font-size: 2.4rem; margin-bottom: 10px; }
  .empty h3 { font-family: 'Coiny', cursive; font-size: 1.2rem; color: var(--purple); margin-bottom: 6px; }
  .empty p   { font-size: .82rem; color: var(--muted); margin-bottom: 16px; }

  /* ── emoji picker ────────────────────────────────────────────────── */
  .emoji-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
  .ep {
    font-size: 1.3rem; border: 2px solid transparent; border-radius: 8px;
    padding: 3px; cursor: pointer; transition: all .14s; background: none;
  }
  .ep:hover  { background: var(--cream2); }
  .ep.picked { border-color: var(--pink); background: var(--pink2); }
</style>

<nav class="nav">
  <a class="nav-brand" href="/dashboard">🍧 Halo-Halo</a>
  <div class="nav-right">
    <button class="toggle-wrap" onclick="toggleDark()" title="Toggle dark mode">
      <span class="toggle-knob" id="dm-knob">🌙</span>
      <span class="toggle-track" id="dm-track"></span>
    </button>
    <div class="avatar" id="nav-av"></div>
    <button class="btn-nav" onclick="logout()">Sign out</button>
  </div>
</nav>

<div class="page">
  <!-- greeting -->
  <div class="greeting">
    <div class="greeting-text">
      <h2 id="greet-name">Hey there 👋</h2>
      <p>What are you studying today?</p>
    </div>
    <button class="btn btn-secondary btn-sm" onclick="openDeckModal()">+ New Deck</button>
  </div>

  <!-- stats -->
  <div class="stats">
    <div class="stat-pill"><div class="stat-num" id="s-decks">—</div><div class="stat-lbl">Decks</div></div>
    <div class="stat-pill"><div class="stat-num" id="s-subj">—</div><div class="stat-lbl">Subjects</div></div>
    <div class="stat-pill"><div class="stat-num" id="s-mastery">—</div><div class="stat-lbl">Avg Mastery</div></div>
  </div>

  <!-- decks -->
  <div class="sec-head">
    <span class="sec-title">Your Decks</span>
  </div>
  <div class="deck-grid" id="deck-grid"></div>
</div>

<!-- deck modal -->
<div class="overlay hidden" id="deck-modal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="dm-title">New Deck</h3>
      <button class="modal-close" onclick="closeDeckModal()">✕</button>
    </div>
    <div class="modal-body">
      <div style="margin-bottom:16px">
        <label class="label">Deck name</label>
        <input class="field" id="dm-name" type="text" placeholder="e.g. Biology Semester 1"/>
      </div>
      <div>
        <label class="label">Icon</label>
        <div class="emoji-row" id="dm-emojis"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeDeckModal()">Cancel</button>
      <button class="btn btn-primary" id="dm-save-btn" onclick="saveDeck()">Create</button>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  const EMOJIS = ['📚','🧪','🌍','🔬','📐','🎨','💻','🧠','📖','⚗️','🎵','🏛️','🌿','💡','🗺️','✏️'];
  let decks = [], editId = null, picked = '📚';

  document.addEventListener('DOMContentLoaded', () => {
    const u = '{{ username }}';
    document.getElementById('greet-name').textContent = `Hey, ${u} 👋`;
    document.getElementById('nav-av').textContent = u[0].toUpperCase();
    loadDecks();
  });

  async function loadDecks() {
    const { ok, data } = await api('/api/decks');
    if (!ok) return;
    decks = data;
    renderDecks();
  }

  function renderDecks() {
    const grid = document.getElementById('deck-grid');
    const totalSubj = decks.reduce((a, d) => a + (d.subject_count || 0), 0);
    const avgM = decks.length ? Math.round(decks.reduce((a,d) => a+(d.mastery||0), 0) / decks.length) : 0;
    document.getElementById('s-decks').textContent   = decks.length;
    document.getElementById('s-subj').textContent    = totalSubj;
    document.getElementById('s-mastery').textContent = avgM + '%';

    if (!decks.length) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-emoji">🗂️</div>
          <h3>No decks yet</h3>
          <p>Create your first deck to get started.</p>
          <button class="btn btn-primary" onclick="openDeckModal()">+ Create Deck</button>
        </div>
        <div class="deck-add" onclick="openDeckModal()">
          <div class="deck-add-icon">+</div><span>New Deck</span>
        </div>`;
      return;
    }

    grid.innerHTML = decks.map((d, i) => `
      <div class="deck-card" style="animation-delay:${i*40}ms" onclick="goToDeck(${d.id})">
        <div class="deck-card-bar"></div>
        <div class="deck-card-body">
          <span class="deck-emoji">${esc(d.emoji)}</span>
          <div class="deck-name">${esc(d.name)}</div>
          <div class="deck-meta">${d.subject_count || 0} subject${d.subject_count !== 1 ? 's' : ''}</div>
          <div class="mbar-wrap">
            <div class="mbar-row"><span>Mastery</span><span>${d.mastery || 0}%</span></div>
            <div class="mbar"><div class="mbar-fill" style="width:${d.mastery||0}%"></div></div>
          </div>
          <div class="deck-actions" onclick="event.stopPropagation()">
            <button class="btn btn-ghost" onclick="editDeck(${d.id},'${esc(d.name)}','${esc(d.emoji)}')">Edit</button>
            <button class="btn btn-danger" onclick="delDeck(${d.id})">Delete</button>
          </div>
        </div>
      </div>`
    ).join('') + `<div class="deck-add" onclick="openDeckModal()"><div class="deck-add-icon">+</div><span>New Deck</span></div>`;
  }

  function goToDeck(id) { location.href = `/deck/${id}`; }

  function buildEmojiRow() {
    document.getElementById('dm-emojis').innerHTML = EMOJIS.map(e =>
      `<button class="ep${e===picked?' picked':''}" onclick="pickEmoji('${e}',this)">${e}</button>`
    ).join('');
  }
  function pickEmoji(e, btn) {
    picked = e;
    document.querySelectorAll('.ep').forEach(b => b.classList.remove('picked'));
    btn.classList.add('picked');
  }

  function openDeckModal() {
    editId = null; picked = '📚';
    document.getElementById('dm-title').textContent = 'New Deck';
    document.getElementById('dm-save-btn').textContent = 'Create';
    document.getElementById('dm-name').value = '';
    buildEmojiRow();
    document.getElementById('deck-modal').classList.remove('hidden');
    setTimeout(() => document.getElementById('dm-name').focus(), 50);
  }
  function editDeck(id, name, emoji) {
    editId = id; picked = emoji;
    document.getElementById('dm-title').textContent = 'Edit Deck';
    document.getElementById('dm-save-btn').textContent = 'Save';
    document.getElementById('dm-name').value = name;
    buildEmojiRow();
    document.getElementById('deck-modal').classList.remove('hidden');
  }
  function closeDeckModal() { document.getElementById('deck-modal').classList.add('hidden'); }

  async function saveDeck() {
    const name = document.getElementById('dm-name').value.trim();
    if (!name) { toast('Enter a deck name'); return; }
    if (editId) {
      await api(`/api/decks/${editId}`, { method:'PUT', body: JSON.stringify({name, emoji:picked}) });
      toast('Deck updated');
    } else {
      await api('/api/decks', { method:'POST', body: JSON.stringify({name, emoji:picked}) });
      toast('Deck created 🎉');
    }
    closeDeckModal(); loadDecks();
  }

  async function delDeck(id) {
    if (!confirm('Delete this deck and all its subjects?')) return;
    await api(`/api/decks/${id}`, { method: 'DELETE' });
    toast('Deleted'); loadDecks();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !document.getElementById('deck-modal').classList.contains('hidden')) saveDeck();
  });
</script>
{% endblock %}
